<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Countdown</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
    font-family:'Poppins',sans-serif;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    background:linear-gradient(135deg,#ff4fa3,#ff85c8,#ffd1e8);
}
.bg{
    position:absolute;
    inset:0;
}
.circle{
    position:absolute;
    border-radius:50%;
    background:rgba(255,255,255,.15);
    backdrop-filter:blur(5px);
    animation:float 8s infinite ease-in-out;
}
.circle:nth-child(1){width:220px;height:220px;top:10%;left:10%;}
.circle:nth-child(2){width:150px;height:150px;bottom:10%;right:12%;animation-delay:2s;}
.circle:nth-child(3){width:100px;height:100px;top:20%;right:20%;animation-delay:4s;}
@keyframes float{
    50%{transform:translateY(-25px)}
}
.card{
    position:relative;
    z-index:2;
    width:min(92%,900px);
    padding:40px;
    border-radius:30px;
    background:rgba(255,255,255,.18);
    backdrop-filter:blur(18px);
    border:1px solid rgba(255,255,255,.3);
    text-align:center;
    color:white;
    box-shadow:0 20px 50px rgba(0,0,0,.18);
}
h1{
    font-size:3rem;
    margin-bottom:10px;
}
.subtitle{
    opacity:.9;
    margin-bottom:30px;
}
.countdown{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:15px;
}
.box{
    background:rgba(255,255,255,.18);
    padding:20px;
    border-radius:20px;
}
.num{
    font-size:3rem;
    font-weight:700;
}
.label{
    font-size:.9rem;
    letter-spacing:2px;
}
@media(max-width:700px){
    .countdown{grid-template-columns:repeat(2,1fr)}
    h1{font-size:2rem}
    .num{font-size:2.2rem}
}
</style>
</head>
<body>
<div class="bg">
    <div class="circle"></div>
    <div class="circle"></div>
    <div class="circle"></div>
</div>

<div class="card">
    <h1>🎂 Birthday Countdown</h1>
    <p class="subtitle">A special moment is almost here ✨</p>

    <div class="countdown">
        <div class="box"><div class="num" id="days">0</div><div class="label">DAYS</div></div>
        <div class="box"><div class="num" id="hours">0</div><div class="label">HOURS</div></div>
        <div class="box"><div class="num" id="minutes">0</div><div class="label">MINUTES</div></div>
        <div class="box"><div class="num" id="seconds">0</div><div class="label">SECONDS</div></div>
    </div>
</div>

<script>
const targetDate = new Date("June 4, 2026 00:00:00").getTime();

function updateCountdown(){
    const now = new Date().getTime();
    const diff = targetDate - now;

    if(diff <= 0){
        window.location.href = "birthday.html";
        return;
    }

    document.getElementById("days").textContent =
        Math.floor(diff/(1000*60*60*24));

    document.getElementById("hours").textContent =
        Math.floor((diff%(1000*60*60*24))/(1000*60*60));

    document.getElementById("minutes").textContent =
        Math.floor((diff%(1000*60*60))/(1000*60));

    document.getElementById("seconds").textContent =
        Math.floor((diff%(1000*60))/1000);
}

updateCountdown();
setInterval(updateCountdown,1000);
</script>
</body>
</html>
